# .github/workflows/security.yml
#
# Security CI pipeline for Python projects — three jobs:
#   1. audit   — pip-audit (fail on high/critical CVEs)
#   2. sast    — Bandit security scan + Ruff linter + mypy type-check
#   3. verify  — ensure the project imports without errors
#
# Runs on: push/PR to master, and weekly on Monday 08:00 UTC.
#
# BEFORE USE — adapt the following:
#   - python-version: change "3.12" to your Python version
#   - Source paths in bandit/ruff/mypy if code is not at root

name: Security

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Check for requirements file
        id: check_reqs
        run: |
          if [ -f requirements.txt ]; then
            echo "has_reqs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_reqs=false" >> "$GITHUB_OUTPUT"
            echo "No requirements.txt found — skipping pip-audit"
          fi

      - name: pip-audit (fail on high/critical)
        if: steps.check_reqs.outputs.has_reqs == 'true'
        run: pip-audit --requirement requirements.txt --severity high

  sast:
    name: Static Analysis (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install bandit ruff mypy

      - name: Detect Python source directory
        id: detect_src
        run: |
          if [ -d "src" ]; then
            echo "src_dir=src" >> "$GITHUB_OUTPUT"
          elif [ -d "app" ]; then
            echo "src_dir=app" >> "$GITHUB_OUTPUT"
          elif [ -d "lib" ]; then
            echo "src_dir=lib" >> "$GITHUB_OUTPUT"
          else
            echo "src_dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Bandit security scan
        run: bandit -r ${{ steps.detect_src.outputs.src_dir }} -ll -x tests/ --format json --output bandit-report.json || true
        continue-on-error: false

      - name: Bandit readable output
        if: always()
        run: bandit -r ${{ steps.detect_src.outputs.src_dir }} -ll -x tests/ || true

      - name: Ruff lint check
        run: ruff check ${{ steps.detect_src.outputs.src_dir }}

      - name: mypy type check
        run: mypy ${{ steps.detect_src.outputs.src_dir }} --ignore-missing-imports
        continue-on-error: true
